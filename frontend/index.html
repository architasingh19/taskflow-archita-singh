<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Task Management</title>
    <meta name="description" content="TaskFlow - A modern task management application" />
    <script>
      // Handle SPA redirect from 404.html
      (function() {
        var redirect = sessionStorage.getItem('redirectPath');
        if (redirect) {
          sessionStorage.removeItem('redirectPath');
          // Only restore path if it starts with the base path
          var basePath = '/taskflow-archita-singh';
          if (redirect.startsWith(basePath)) {
            // Extract the path after base
            var pathAfterBase = redirect.slice(basePath.length) || '/';
            window.history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
