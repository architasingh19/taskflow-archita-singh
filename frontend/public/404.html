<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // Redirects 404s to index.html with the path preserved
    (function() {
      var basePath = '/taskflow-archita-singh';
      var fullPath = window.location.pathname + window.location.search + window.location.hash;
      
      // Store the full path for the app to restore
      sessionStorage.setItem('redirectPath', fullPath);
      
      // Redirect to the base index.html
      window.location.replace(window.location.origin + basePath + '/');
    })();
  </script>
</head>
<body>
  <noscript>
    <p>JavaScript is required for this application.</p>
  </noscript>
</body>
</html>
